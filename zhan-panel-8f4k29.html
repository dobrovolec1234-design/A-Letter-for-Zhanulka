<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Панель</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"><style>body{background:#030303;color:#f5e2c4;font-family:system-ui}.login,.panelbox{max-width:1100px;margin:6vh auto;padding:28px;border-radius:24px;background:#160806;border:1px solid rgba(201,155,90,.22)}.hidden{display:none!important}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card,.item{padding:18px;border-radius:18px;background:#0b0504;border:1px solid rgba(201,155,90,.22)}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{width:auto}.active{background:#cf6f02!important;color:#fff1d9!important}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{width:auto;padding:8px 10px}.ok{background:#166534}.danger{background:#991b1b}.warn{background:#92400e}@media(max-width:800px){.grid4,.cards{grid-template-columns:1fr}}</style></head><body><div id="login" class="login"><h1>🔒 Вход в панель</h1><p>Доступ только для администратора.</p><button id="googleLoginBtn">Войти через Google</button><input id="emailInput" type="email" placeholder="Email"><input id="passwordInput" type="password" placeholder="Пароль"><p style="padding:12px;border:1px solid rgba(207,111,2,.45);border-radius:14px;background:rgba(207,111,2,.08)">⚠ Используйте отдельный пароль для сайта, не пароль от почты.</p><button id="emailLoginBtn">Войти по Email</button><p id="loginStatus"></p></div><div id="blocked" class="login hidden"><h1>⛔ Доступ запрещён</h1><button id="logoutBtnBlocked">Выйти</button></div><main id="app" class="panelbox hidden"><h1>Жанулька Admin v4.0</h1><p id="adminEmail"></p><button id="logoutBtn">Выйти</button><div class="tabs"><button class="active" data-panel="dashboard">Обзор</button><button data-panel="messages">Пожелания</button><button data-panel="stories">Истории</button><button data-panel="feedback">Feedback</button></div><section id="dashboard" class="panel"><div class="grid4"><div class="card">❤️ <b id="statHearts">0</b></div><div class="card">👀 <b id="statViews">0</b></div><div class="card">👥 <b id="statUsers">0</b></div><div class="card">🟢 <b id="statOnline">0</b></div></div></section><section id="messages" class="panel hidden"><h2>Пожелания</h2><div class="cards" id="messagesList"></div></section><section id="stories" class="panel hidden"><h2>Истории</h2><div class="cards" id="storiesList"></div></section><section id="feedback" class="panel hidden"><h2>Feedback</h2><div class="cards" id="feedbackList"></div></section></main><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";import{getAuth,GoogleAuthProvider,signInWithPopup,signInWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";import{getDatabase,ref,onValue,update,remove}from"https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";const ADMIN_EMAIL="dobrovolec1234@gmail.com";const firebaseConfig={apiKey:"AIzaSyAnBQnt8bK-3G0zjNyIQsLY5s-_rjIV2Mk",authDomain:"a-letter-for-zhanulka.firebaseapp.com",databaseURL:"https://a-letter-for-zhanulka-default-rtdb.europe-west1.firebasedatabase.app",projectId:"a-letter-for-zhanulka",storageBucket:"a-letter-for-zhanulka.firebasestorage.app",messagingSenderId:"479179895784",appId:"1:479179895784:web:7f3bcd70ed9070c0816a5d"};const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app);const $=id=>document.getElementById(id),safe=v=>String(v||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));let C={stats:{},users:{},presence:{},messages:{},stories:{},feedback:{}};googleLoginBtn.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>loginStatus.textContent='Ошибка Google входа: '+e.message+' Если видишь auth/unauthorized-domain, добавь домен сайта в Firebase Authentication → Settings → Authorized domains.');emailLoginBtn.onclick=()=>signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value).catch(e=>loginStatus.textContent='Ошибка входа: '+e.message);logoutBtn.onclick=()=>signOut(auth);logoutBtnBlocked.onclick=()=>signOut(auth);document.querySelectorAll('[data-panel]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-panel]').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.add('hidden'));b.classList.add('active');$(b.dataset.panel).classList.remove('hidden')});onAuthStateChanged(auth,u=>{if(!u){login.classList.remove('hidden');blocked.classList.add('hidden');app.classList.add('hidden');return}if(u.email!==ADMIN_EMAIL){login.classList.add('hidden');blocked.classList.remove('hidden');app.classList.add('hidden');return}adminEmail.textContent=u.email;login.classList.add('hidden');blocked.classList.add('hidden');app.classList.remove('hidden');start()});let started=false;function start(){if(started)return;started=true;onValue(ref(db,'stats'),s=>{C.stats=s.val()||{};renderStats()});onValue(ref(db,'users'),s=>{C.users=s.val()||{};renderStats()});onValue(ref(db,'presence'),s=>{C.presence=s.val()||{};renderStats()});onValue(ref(db,'messages'),s=>{C.messages=s.val()||{};renderList('messages',messagesList)});onValue(ref(db,'stories'),s=>{C.stories=s.val()||{};renderList('stories',storiesList)});onValue(ref(db,'feedback'),s=>{C.feedback=s.val()||{};feedbackList.innerHTML=arr(C.feedback).map(x=>`<div class=item><h3>${safe(x.name||'Гость')}</h3><p>${safe(x.text)}</p><button class="small danger" data-action="delete" data-type="feedback" data-id="${x.id}">Удалить</button></div>`).join('')||'Нет feedback'})}function arr(o){return Object.entries(o||{}).map(([id,v])=>({id,...v})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))}function renderStats(){statHearts.textContent=C.stats.hearts||0;statViews.textContent=C.stats.views||0;statUsers.textContent=Object.keys(C.users||{}).length;statOnline.textContent=Object.values(C.presence||{}).filter(x=>x&&x.online).length}function renderList(type,el){el.innerHTML=arr(C[type]).map(x=>`<div class=item><h3>${safe(x.title||x.name||'Гость')}</h3><p>${safe(x.text)}</p><p>${x.status||'pending'}</p><div class=actions><button class="small ok" data-action="approve" data-type="${type}" data-id="${x.id}">Одобрить</button><button class="small warn" data-action="pending" data-type="${type}" data-id="${x.id}">В модерацию</button><button class="small danger" data-action="delete" data-type="${type}" data-id="${x.id}">Удалить</button></div></div>`).join('')||'Нет данных'}document.body.onclick=async e=>{let b=e.target.closest('[data-action]');if(!b)return;if(b.dataset.action==='delete')return remove(ref(db,`${b.dataset.type}/${b.dataset.id}`));await update(ref(db,`${b.dataset.type}/${b.dataset.id}`),{status:b.dataset.action==='approve'?'approved':'pending'})};</script></body></html>
